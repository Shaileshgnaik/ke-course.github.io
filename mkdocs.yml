site_name: Knowledge Engineering — Building Intelligent Systems
site_description: A complete course on Knowledge Engineering for IT professionals
site_author: Knowledge Engineering Course
site_url: https://Shaileshgnaik.github.io/ke-course.github.io
repo_url: https://github.com/Shaileshgnaik/ke-course.github.io
repo_name: Shaileshgnaik/ke-course.github.io

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Course Overview: course-overview.md
  - "Part 1: Foundations":
    - Overview: part1/index.md
    - "Module 1.1 — What is KE?": part1/module-1-1.md
    - "Module 1.2 — Types of Knowledge": part1/module-1-2.md
    - "Module 1.3 — The KE Lifecycle": part1/module-1-3.md
    - "Module 1.4 — Expert Systems": part1/module-1-4.md
    - "Module 1.5 — The Bottleneck": part1/module-1-5.md
    - Labs: part1/labs.md
    - Slide Outlines: part1/slides.md
    - Quiz & Assessment: part1/assessment.md
  - "Part 2: Knowledge Acquisition":
    - Overview: part2/index.md
    - "Module 2.1 — Elicitation Techniques": part2/module-2-1.md
    - "Module 2.2 — Document & Text Mining": part2/module-2-2.md
    - "Module 2.3 — ML for Acquisition": part2/module-2-3.md
    - "Module 2.4 — LLM Acquisition": part2/module-2-4.md
    - "Module 2.5 — Human-AI Pipeline": part2/module-2-5.md
    - Labs: part2/labs.md
    - Slide Outlines: part2/slides.md
    - Quiz & Assessment: part2/assessment.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Shaileshgnaik/ke-course
